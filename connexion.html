<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <form class="flex flex-col gap-4 items-center justify-center  h-screen bg-[#494C4F] sm:w-full lg:w-full md:w-full">
        <div class="flex items-center gap-4 ">
           <i class="fa-solid fa-bookmark fa-xl" style="color: rgb(255, 251, 251);" ></i>
                <h1 class="text-2xl font-bold  text-clifford flex  justify-center text-[#FFFFFFDE] ">Red product</h1>
            </div>

        <div class=" bg-white  border border-blue-600 w-[384px] h-[424px] p-4">
            
            <div class="p-4">
                <h1 class="text-1xl  flex flex-center justify-center  **text-clifford**">
                    Connetez-vous en tant que Admin
                </h1>
            </div>
            <!-- e-mail -->
            <div class="flex p-4 mt-3">
                <input type="email" placeholder="E-mail" class=" border-b w-full outline-none ">
            </div>

            <!-- mot de passe -->
            <div class="flex justify-center p-4 mt-3">
                <input type="password" placeholder="mot de passe" class=" border-b w-full outline-none">
            </div>

            <!-- button  -->
            <div class="flex gap-4 mt-6 p-4 ">
                <input type="checkbox" id="scales" name="scales" class="w-[24px] text-[5px] outline-none" />
                <label for="scales">Gardez moi connecter</label>
            </div>
            <!-- button connection-->
            <div class="flex justify-center mt-3">
                <button class="bg-[#45484B] text-white px-6 py-2 rounded items-center w-[320px] mt-16">
                    Connexion
                </button>
            </div>
        </div>
        <div>
            <a href="Mot de passe oublié?" class="text-[#FFD964]">Mot de passe oublié?</a>
        </div>
        <div class="flex">
            <h2>vous m'avez pas de compte?</h2><a href="s'incrire" class="text-[#FFD964] text-1xl" >s'incrire</a>
        </div>
    </form>


    <script src="script.js"></script>
</body>

</html>
