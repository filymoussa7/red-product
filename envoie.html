<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <form class="flex flex-col gap-4 items-center justify-center  h-screen bg-[#494C4F] sm:w-full lg:w-full md:w-full">
        <div class="flex items-center gap-4 ">
            <i class="fa-solid fa-bookmark fa-xl" style="color: rgb(255, 251, 251);"></i>
            <h1 class="text-2xl font-bold  text-clifford flex  justify-center text-[#FFFFFFDE] ">Red product</h1>
        </div>

        <div class=" bg-white  border border-blue-600 w-[384px] h-[358px] p-4">

            <div class="p-4">
                <h1 class="text-1xl  flex flex-center justify-center  **text-clifford**">
                    Mot de passe oublié?
                </h1>
            </div>
            <div class="ml-4">
                <p>Entrez votre adresse e-mail ci-dessous <br> et nous vous envoyones des instruction sur la <br>façon
                    mondifié votre mot de passe.</p>
            </div>
            <div class="flex justify-center p-4 mt-6 ">
                <input type="e-mail" placeholder="votre e-mail" class=" border-b w-full outline-none">
            </div>
            <!-- button connection-->
            <div class="flex justify-center mt-3">
                <button class="bg-[#45484B] text-white px-6 py-2 rounded items-center w-[320px] mt-16">
                    Envoyer
                </button>
            </div>
        </div>

        <div class="flex gap-2">
            <h2 class="text-2xl text-white">Revenir à la </h2><a href="Connexion"
                class="text-[#FFD964] text-2xl">Connexion</a>
        </div>
    </form>


    <script src="script.js"></script>
</body>

</html>
